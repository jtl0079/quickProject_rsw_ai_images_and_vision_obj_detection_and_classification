name: rsw_ai

channels:
  - conda-forge
  - defaults

dependencies:
  - python>=3.11, <3.12

  - numpy
  - matplotlib
  - pillow

  - pyyaml
  - jupyter
  - ipykernel

  - libgl

  - pip

  - pip:
      --index-url https://download.pytorch.org/whl/cu118
      torch
      torchvision
      torchaudio
      opencv-python
      requests